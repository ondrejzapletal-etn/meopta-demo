    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Get PR details
        id: pr
        run: |
          PR_DATA=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRefName --jq '.headRefName')
          echo "branch=$PR_DATA" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}

      - name: Checkout PR branch
        uses: actions/checkout@v4
